name: Build Khata Book APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install npm dependencies
        run: npm install

      - name: Initialize Capacitor
        run: npx cap init "Khata Book" "com.khatabook.app" --web-dir www 2>/dev/null || true

      - name: Add Android platform
        run: npx cap add android
        env:
          CI: true

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Fix minSdkVersion for SQLite plugin
        run: |
          sed -i 's/minSdkVersion = .*/minSdkVersion = 23/' android/variables.gradle || true
          sed -i 's/minSdkVersion .*/minSdkVersion 23/' android/app/build.gradle || true

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/KhataBook.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KhataBook-APK
          path: android/app/build/outputs/apk/debug/KhataBook.apk
          retention-days: 30
          if-no-files-found: error
